name: Nightly Publish
on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - dir: go
            repo: hop-top/xrr
          - dir: ts
            repo: hop-top/xrr-ts
          - dir: py
            repo: hop-top/xrr-py
          - dir: php
            repo: hop-top/xrr-php
          - dir: rs
            repo: hop-top/xrr-rs
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Check for changes
        id: check
        env:
          DIR: ${{ matrix.dir }}
          GH_TOKEN: ${{ github.token }}
        run: |
          LAST=$(git log -1 --format=%H -- "$DIR/")
          MARKER=$(gh variable get "LAST_PUBLISH_${DIR}" 2>/dev/null || echo "none")
          echo "changed=$( [ "$LAST" != "$MARKER" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
          echo "sha=$LAST" >> "$GITHUB_OUTPUT"
      - name: Split + push
        if: steps.check.outputs.changed == 'true'
        env:
          DIR: ${{ matrix.dir }}
          REPO: ${{ matrix.repo }}
          TOKEN: ${{ secrets.SPLIT_TOKEN }}
        run: |
          git subtree split --prefix="$DIR" -b split
          git push \
            "https://x-access-token:${TOKEN}@github.com/${REPO}.git" \
            split:main --force
      - name: Update marker
        if: steps.check.outputs.changed == 'true'
        env:
          DIR: ${{ matrix.dir }}
          SHA: ${{ steps.check.outputs.sha }}
          GH_TOKEN: ${{ github.token }}
        run: gh variable set "LAST_PUBLISH_${DIR}" --body "$SHA"
