name: Split Publish
on:
  push:
    tags: ["v*"]

jobs:
  split:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - dir: go
            repo: hop-top/xrr
          - dir: ts
            repo: hop-top/xrr-ts
          - dir: py
            repo: hop-top/xrr-py
          - dir: php
            repo: hop-top/xrr-php
          - dir: rs
            repo: hop-top/xrr-rs
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Split + push
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ matrix.repo }}
          DIR: ${{ matrix.dir }}
          TOKEN: ${{ secrets.SPLIT_TOKEN }}
        run: |
          git subtree split --prefix="$DIR" -b split
          git push \
            "https://x-access-token:${TOKEN}@github.com/${REPO}.git" \
            split:main --force
          git tag -f "$TAG" split
          git push \
            "https://x-access-token:${TOKEN}@github.com/${REPO}.git" \
            "$TAG" --force
