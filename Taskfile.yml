version: "3"

tasks:
  # ── top-level gates ────────────────────────────────────────────────────────

  test:
    desc: Run all test suites in parallel
    deps: [test:go, test:py, test:rs, test:ts, test:php]

  e2e:
    desc: Run all e2e test suites in parallel
    deps: [e2e:go, e2e:py, e2e:rs, e2e:ts, e2e:php]

  lint:
    desc: Run all linters in parallel
    deps: [lint:go, lint:py, lint:rs, lint:ts, lint:php]

  check:
    desc: Full gate — lint + test + e2e (all langs, parallel)
    deps: [lint, test, e2e]

  # ── go ─────────────────────────────────────────────────────────────────────

  test:go:
    desc: Go tests
    dir: go
    cmds:
      - go test ./...

  e2e:go:
    desc: Go e2e tests
    dir: go
    cmds:
      - go test -v -run TestE2E .

  lint:go:
    desc: Go lint (golangci-lint)
    dir: go
    cmds:
      - golangci-lint run

  # ── python ─────────────────────────────────────────────────────────────────

  test:py:
    desc: Python tests (uv + pytest)
    dir: py
    cmds:
      - uv run pytest

  e2e:py:
    desc: Python e2e tests
    dir: py
    cmds:
      - uv run pytest tests/test_e2e.py -v

  lint:py:
    desc: Python lint (ruff)
    dir: py
    cmds:
      - uv run ruff check .

  # ── rust ───────────────────────────────────────────────────────────────────

  test:rs:
    desc: Rust tests
    dir: rs
    cmds:
      - cargo test

  e2e:rs:
    desc: Rust e2e tests
    dir: rs
    cmds:
      - cargo test --test e2e

  lint:rs:
    desc: Rust lint (clippy)
    dir: rs
    cmds:
      - cargo clippy -- -D warnings

  # ── typescript ─────────────────────────────────────────────────────────────

  test:ts:
    desc: TypeScript tests (vitest)
    dir: ts
    cmds:
      - pnpm test

  e2e:ts:
    desc: TypeScript e2e tests
    dir: ts
    cmds:
      - pnpm test tests/e2e.test.ts

  lint:ts:
    desc: TypeScript lint (eslint + typescript-eslint)
    dir: ts
    cmds:
      - pnpm lint

  # ── php ────────────────────────────────────────────────────────────────────

  test:php:
    desc: PHP tests (phpunit)
    dir: php
    cmds:
      - ./vendor/bin/phpunit

  e2e:php:
    desc: PHP e2e tests
    dir: php
    cmds:
      - ./vendor/bin/phpunit tests/E2eTest.php --testdox

  lint:php:
    desc: PHP static analysis (phpstan)
    dir: php
    cmds:
      - ./vendor/bin/phpstan analyse src --level 9
